services:
  api:
    image: ${ACMF_BENCHMARK_IMAGE:-acmf:beam-benchmark}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.benchmark
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started

  worker:
    image: ${ACMF_BENCHMARK_IMAGE:-acmf:beam-benchmark}
    env_file:
      - .env.benchmark
    command: ["celery", "-A", "app.workers.queue.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: acmf
      POSTGRES_USER: acmf
      POSTGRES_PASSWORD: acmf
    ports:
      - "5432:5432"
    volumes:
      - postgres_benchmark_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acmf -d acmf"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/acmfpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_benchmark_data:/data

volumes:
  postgres_benchmark_data:
  neo4j_benchmark_data:
